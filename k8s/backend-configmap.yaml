apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: fund-rag
data:
  # Azure OpenAI Configuration
  AZURE_OPENAI_ENDPOINT: "https://aoai-ep-swedencentral02.openai.azure.com/"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-5-nano"
  AZURE_TEXT_EMBEDDING_DEPLOYMENT_NAME: "text-embedding-3-small"

  # Azure AI Search Configuration
  AZURE_SEARCH_ENDPOINT: "https://chatops-ozguler.search.windows.net"

  # PII Container Configuration
  PII_ENDPOINT: "http://pii-ozguler.eastus.azurecontainer.io:5000"
  PII_CONTAINER_ENDPOINT: "http://pii-ozguler.eastus.azurecontainer.io:5000"

  # PostgreSQL Configuration (using private endpoint)
  # IMPORTANT: Using read-only user to prevent any data modifications
  PGHOST: "aistartupstr.postgres.database.azure.com"
  PGPORT: "5432"
  PGDATABASE: "fundrag"
  PGUSER: "fundrag_readonly"

  # Application Configuration
  FLASK_ENV: "production"
  LOG_LEVEL: "INFO"
  USE_POSTGRES: "true"

  # Azure AI Foundry Configuration (for Foundry IQ mode)
  AZURE_AI_PROJECT_ENDPOINT: "https://ozgurguler-7212-resource.services.ai.azure.com/api/projects/ozgurguler-7212"
  AZURE_OPENAI_ENDPOINT_FOUNDRY: "https://ozgurguler-7212-resource.openai.azure.com"
  FOUNDRY_AGENT_NAME: "funds-foundry-IQ-agent"
  FOUNDRY_MODEL_DEPLOYMENT: "gpt-5-nano"

  # Separate Fabric IQ lane configuration
  FABRIC_IQ_FOUNDRY_BASE_URL: "https://xxxxxxx.services.ai.azure.com"
  FABRIC_IQ_FOUNDRY_PROJECT: "admin-4912"
  FABRIC_IQ_AGENT_NAME: "af-funds-fabric-agent"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fund-rag-backend
  namespace: fund-rag
  labels:
    app: fund-rag-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fund-rag-backend
  template:
    metadata:
      labels:
        app: fund-rag-backend
    spec:
      nodeSelector:
        workload: fund-rag
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: fund-rag-backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: aistartuptr.azurecr.io/fund-rag-backend:latest
        ports:
        - containerPort: 5001
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "12Gi"
            cpu: "4"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: fund-rag-backend
  namespace: fund-rag
spec:
  selector:
    app: fund-rag-backend
  ports:
  - port: 5001
    targetPort: 5001
    name: http
  type: ClusterIP
